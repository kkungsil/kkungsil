<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>채팅</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 14px sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
.wrap { width: 700px; height: 340px; background: #fff; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
.msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 65%; padding: 8px 12px; border-radius: 16px; font-size: 13px; line-height: 1.5; word-break: break-word; }
.msg.blue { background: #4a80f5; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.gray { background: #e9e9eb; color: #1c1c1e; align-self: flex-start; border-bottom-left-radius: 4px; }
.bottom { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #eee; align-items: center; }
.color-btns { display: flex; gap: 6px; flex-shrink: 0; }
.cbtn { width: 28px; height: 28px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: border .15s; }
.cbtn.active { border-color: #333; }
input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-size: 13px; }
button#sbtn { padding: 8px 16px; border: none; border-radius: 10px; color: #fff; cursor: pointer; font-size: 13px; transition: background .2s, opacity .2s; }
button#sbtn:disabled { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>
<div class="wrap">
  <div class="msgs" id="msgs"></div>
  <div class="bottom">
    <div class="color-btns">
      <div class="cbtn active" id="btn-blue" style="background:#4a80f5"></div>
      <div class="cbtn" id="btn-gray" style="background:#e9e9eb"></div>
    </div>
    <input id="inp" placeholder="메시지 입력..."/>
    <button id="sbtn" style="background:#4a80f5">전송</button>
  </div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, onSnapshot, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyCY22slfDTglAHV1P5iEVuEQ6XTslqZBWY",
  authDomain: "kkungsil-3a843.firebaseapp.com",
  projectId: "kkungsil-3a843",
  storageBucket: "kkungsil-3a843.firebasestorage.app",
  messagingSenderId: "696502895777",
  appId: "1:696502895777:web:bc294e4fe19a5a0a131ce0"
});

const db = getFirestore(app);
const col = collection(db, 'chat');
let ready = true;
let curColor = 'blue';

// onclick 대신 addEventListener로 연결
document.getElementById('btn-blue').addEventListener('click', () => setColor('blue'));
document.getElementById('btn-gray').addEventListener('click', () => setColor('gray'));

function setColor(c) {
  curColor = c;
  document.getElementById('btn-blue').classList.toggle('active', c === 'blue');
  document.getElementById('btn-gray').classList.toggle('active', c === 'gray');
  document.getElementById('sbtn').style.background = c === 'blue' ? '#4a80f5' : '#9e9ea0';
}

onSnapshot(query(col, orderBy('time')), snap => {
  const box = document.getElementById('msgs');
  box.innerHTML = '';
  snap.forEach(doc => {
    const div = document.createElement('div');
    div.className = 'msg ' + (doc.data().color || 'blue');
    div.textContent = doc.data().text;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
});

function send() {
  if (!ready) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;

  addDoc(col, { text, color: curColor, time: Date.now() });
  inp.value = '';

  ready = false;
  document.getElementById('sbtn').disabled = true;
  setTimeout(() => {
    ready = true;
    document.getElementById('sbtn').disabled = false;
    inp.focus();
  }, 1000);
}

document.getElementById('sbtn').addEventListener('click', send);
document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); send(); }
});
</script>
</body>
</html>
