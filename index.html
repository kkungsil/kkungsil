<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>채팅</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 14px sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
.wrap { width: 700px; height: 340px; background: #fff; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
.msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.row { display: flex; flex-direction: column; gap: 2px; }
.row.me { align-items: flex-end; }
.row.other { align-items: flex-start; }
.msg { max-width: 65%; padding: 8px 12px; border-radius: 16px; font-size: 13px; line-height: 1.5; word-break: break-word; }
.row.me .msg { background: #4a80f5; color: #fff; border-bottom-right-radius: 4px; }
.row.other .msg { background: #e9e9eb; color: #1c1c1e; border-bottom-left-radius: 4px; }
.time { font-size: 10px; color: #bbb; padding: 0 4px; }
.bottom { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #eee; }
input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-size: 13px; }
button { padding: 8px 16px; border: none; border-radius: 10px; background: #4a80f5; color: #fff; cursor: pointer; font-size: 13px; transition: opacity .2s; }
button:disabled { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>
<div class="wrap">
  <div class="msgs" id="msgs"></div>
  <div class="bottom">
    <input id="inp" placeholder="메시지 입력..."/>
    <button id="sbtn">전송</button>
  </div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, onSnapshot, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyCY22slfDTglAHV1P5iEVuEQ6XTslqZBWY",
  authDomain: "kkungsil-3a843.firebaseapp.com",
  projectId: "kkungsil-3a843",
  storageBucket: "kkungsil-3a843.firebasestorage.app",
  messagingSenderId: "696502895777",
  appId: "1:696502895777:web:bc294e4fe19a5a0a131ce0"
});

const db = getFirestore(app);
const col = collection(db, 'chat');
let ready = true;
let lastCount = 0;

// 브라우저 고유 ID (localStorage에 저장)
let myId = localStorage.getItem('chat_uid');
if (!myId) {
  myId = crypto.randomUUID();
  localStorage.setItem('chat_uid', myId);
}

// 알람음
function playBeep() {
  const ctx = new AudioContext();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value = 880;
  o.type = 'sine';
  g.gain.setValueAtTime(0.3, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
  o.start(); o.stop(ctx.currentTime + 0.4);
}

Notification.requestPermission();

function notify(text) {
  playBeep();
  if (Notification.permission === 'granted') {
    new Notification('새 메시지 💬', { body: text, silent: true });
  }
  let blink = setInterval(() => {
    document.title = document.title === '채팅' ? '💬 새 메시지!' : '채팅';
  }, 800);
  setTimeout(() => { clearInterval(blink); document.title = '채팅'; }, 4000);
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

onSnapshot(query(col, orderBy('time')), snap => {
  const box = document.getElementById('msgs');
  box.innerHTML = '';
  snap.forEach(d => {
    const data = d.data();
    const isMe = data.uid === myId;
    const row = document.createElement('div');
    row.className = 'row ' + (isMe ? 'me' : 'other');

    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = data.text;

    const time = document.createElement('div');
    time.className = 'time';
    time.textContent = formatTime(data.time);

    row.appendChild(msg);
    row.appendChild(time);
    box.appendChild(row);
  });
  box.scrollTop = box.scrollHeight;

  if (snap.size > lastCount) {
    const last = snap.docs[snap.size - 1].data();
    if (last.uid !== myId) notify(last.text);
  }
  lastCount = snap.size;
});

function send() {
  if (!ready) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;

  addDoc(col, { text, uid: myId, time: Date.now() });
  inp.value = '';

  ready = false;
  document.getElementById('sbtn').disabled = true;
  setTimeout(() => {
    ready = true;
    document.getElementById('sbtn').disabled = false;
    inp.focus();
  }, 1000);
}

document.getElementById('sbtn').addEventListener('click', send);
document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); send(); }
});
</script>
</body>
</html>
